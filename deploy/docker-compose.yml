services:
  freqtrade:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: aiquant-freqtrade
    volumes:
      # Mount local user_data to container's freqtrade user_data
      - ../freqtrade/user_data:/freqtrade/user_data
      # Mount configs as read-only for safety
      - ../freqtrade/config_ai_model.json:/freqtrade/config.json:ro
      - ../freqtrade/config_smallcap.json:/freqtrade/config_smallcap.json:ro
      # Mount data/ package so strategies can import data.service (needs write for cache)
      - ../data:/freqtrade/data
    # Freqtrade standard port for REST API / Web UI
    ports:
      - "8080:8080"
    # Default command: run trading with AIModelStrategy
    # Override this via docker compose run for backtesting/hyperopt
    command: >
      trade
      --strategy AIModelStrategy
    restart: unless-stopped
    environment:
      # Optional: pass TZ for accurate timestamp handling
      - TZ=Asia/Shanghai
